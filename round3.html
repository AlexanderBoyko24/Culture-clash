<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy — Magnificent 5</title>
<style>
/* ====== PAGE ====== */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
  background-image: url('image/1.jpg');
  background-size: cover;
  background-position: center;
  min-height: 100vh;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}
h1 {
  text-align: center;
  padding: 20px;
  font-family: 'Lucida Console', Courier, monospace;
  text-shadow: 2px 2px 5px #000;
}

/* ====== SCOREBOARD ====== */
.teams {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 30px;
}
.team-btn {
  background: forestgreen;
  padding: 15px 25px;
  border-radius: 12px;
  text-align: center;
  min-width: 160px;
}
.team-btn div:first-child {
  font-size: 1.3em;
  margin-bottom: 8px;
}
.score {
  font-size: 2.2em;
  margin: 8px 0;
}
.score-controls button {
  margin: 4px;
  padding: 6px 14px;
  font-size: 1em;
  background-color: #2196f3;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}
.score-controls button:hover {
  background-color: #e68900;
}

/* ====== GRID (2 колонки) ====== */
.list {
  max-width: 900px;
  margin: 0 auto 40px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  padding: 10px;
  justify-items: center;
}

/* ====== QUESTION BUTTON (как в Round 1 и 2) ====== */
.statement {
  position: relative;
  width: 260px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50px;
  cursor: pointer;
  font-size: 1.9em;
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 6px #000;
   border: 5px solid #002868;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.35),
    0 6px 10px rgba(0,0,0,0.6);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 0;
}

/* чередование флагов */
.list .statement:nth-child(odd)  { background-image: url("image/ukflag.jpg"); }
.list .statement:nth-child(even) { background-image: url("image/usaflag.jpg"); }

/* тёмный оверлей */
.statement::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  border-radius: 50px;
  z-index: 1;
}

/* текст поверх оверлея */
.statement span {
  position: relative;
  z-index: 2;
}

/* hover */
.statement:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.35),
    0 12px 20px rgba(0,0,0,0.7);
}

/* использованный */
.statement.used {
  background: #555 !important;
  box-shadow: none;
  cursor: not-allowed;
}

/* ====== POPUP ====== */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}
.popup-content {
  background: #111;
  padding: 30px;
  width: 90%;
  max-width: 700px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 20px #000;
}
.timer {
  font-size: 2.4em;
  margin: 10px 0;
}
#questionText {
  font-size: 32px;
  line-height: 1.4;
  color: yellow;
  margin: 20px 0;
}
.answer-buttons button {
  font-size: 1.4em;
  padding: 12px 50px;
  margin: 20px 15px;
  background-color: #2196f3;
}
.result {
  font-size: 38px;
  line-height: 1.4;
  margin: 25px 0;
  color: #fff;
  display: none;
}
button {
  cursor: pointer;
  border-radius: 8px;
  border: none;
  padding: 10px 20px;
  margin-top: 10px;
  background-color: #2196f3;
  color: #fff;
  font-size: 1.1em;
}
button:hover {
  background-color: #1e88e5;
}
.next-btn {
  display: block;
  margin: 40px auto;
  background-color: forestgreen;
  font-size: 1.3em;
  padding: 12px 120px;
}
.next-btn:hover {
  background-color: #45a049;
}
</style>
</head>
<body>

<h1>Round 3 — Magnificent 5</h1>

<!-- TEAMS -->
<div class="teams">
  <div class="team-btn">
    <div id="team1Name">Team 1</div>
    <div class="score" id="score1">0</div>
    <div class="score-controls">
      <button onclick="changeScore(1,1)">+1</button>
      <button onclick="changeScore(1,-1)">-1</button>
    </div>
  </div>
  <div class="team-btn">
    <div id="team2Name">Team 2</div>
    <div class="score" id="score2">0</div>
    <div class="score-controls">
      <button onclick="changeScore(2,1)">+1</button>
      <button onclick="changeScore(2,-1)">-1</button>
    </div>
  </div>
</div>

<!-- QUESTIONS GRID -->
<div class="list" id="list"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <div class="timer" id="timer">60</div>
    <button onclick="startTimer()">Start Timer</button>
    <p id="questionText"></p>
    <div class="answer-buttons">
      <button onclick="showAnswer()">Show the list</button>
    </div>
    <div id="answer" class="result"></div>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- SOUNDS -->
<audio id="correctSound" src="audio/correct.mp3"></audio>
<audio id="wrongSound" src="audio/wrong.mp3"></audio>

<!-- NEXT -->
<a href="round4.html"><button class="next-btn">Next</button></a>

<script>
// TEAM NAMES + SCORES
document.getElementById("team1Name").textContent = localStorage.getItem("team1Name") || "Team 1";
document.getElementById("team2Name").textContent = localStorage.getItem("team2Name") || "Team 2";

let score1 = Number(localStorage.getItem("score1")) || 0;
let score2 = Number(localStorage.getItem("score2")) || 0;
document.getElementById("score1").textContent = score1;
document.getElementById("score2").textContent = score2;

function changeScore(team, delta) {
  if (team === 1) {
    score1 += delta;
    document.getElementById("score1").textContent = score1;
    localStorage.setItem("score1", score1);
  } else {
    score2 += delta;
    document.getElementById("score2").textContent = score2;
    localStorage.setItem("score2", score2);
  }
}

// QUESTIONS DATA
const data = [
  { text: "Name five rulers of Britain", answer: ["Elizabeth II", "George VI", "Victoria", "Henry VIII", "George V"] },
  { text: "Name five US presidents", answer: ["George Washington", "Abraham Lincoln", "Theodore Roosevelt", "Franklin D. Roosevelt", "John F. Kennedy"] },
  { text: "Name five cities in Britain", answer: ["London", "Manchester", "Liverpool", "Birmingham", "Edinburgh"] },
  { text: "Name five cities in the USA", answer: ["New York", "Los Angeles", "Chicago", "Houston", "San Francisco"] },
  { text: "Name five historical places in Britain", answer: ["Stonehenge", "Tower of London", "Hadrian's Wall", "Westminster Abbey", "Edinburgh Castle"] },
  { text: "Name five US holidays", answer: ["Independence Day", "Thanksgiving", "Halloween", "Memorial Day", "Labor Day"] },
  { text: "Name five British holidays", answer: ["Christmas", "Boxing Day", "Easter", "Guy Fawkes Day", "New Year's Day"] },
  { text: "Name five USA TV shows", answer: ["Friends", "The Simpsons", "Breaking Bad", "Game of Thrones", "The Office"] }
 
];

// BUILD GRID
const list = document.getElementById("list");
data.forEach((_, i) => {
  const div = document.createElement("div");
  div.className = "statement";
  div.innerHTML = `<span>Name Five ${i + 1}</span>`;
  div.onclick = () => openQuestion(div, i);
  list.appendChild(div);
});

let current = 0;
let timeLeft = 60;
let timerInterval;

function openQuestion(el, index) {
  if (el.classList.contains("used")) return;
  el.classList.add("used");

  current = index;
  document.getElementById("questionText").textContent = data[index].text;
  document.getElementById("answer").style.display = "none";
  timeLeft = 60;
  document.getElementById("timer").textContent = timeLeft;
  clearInterval(timerInterval);

  document.getElementById("popup").style.display = "flex";
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById("result").textContent = "⏰ Time's up!";
    }
  }, 1000);
}

function showAnswer() {
  const answerDiv = document.getElementById("answer");
  answerDiv.style.display = "block";
  answerDiv.innerHTML = data[current].answer.join(" • ");
}

function closePopup() {
  clearInterval(timerInterval);
  document.getElementById("popup").style.display = "none";
}
</script>
</body>
</html>
