<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy Round 2</title>
<style>
/* ====== PAGE ====== */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
  background-image: url('image/1.jpg');
  background-size: cover;
  background-position: center;
  min-height: 100vh;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}
h1 {
  text-align: center;
  padding: 20px;
  font-family: 'Lucida Console', Courier, monospace;
  text-shadow: 2px 2px 5px #000;
}

/* ====== SCOREBOARD ====== */
.teams {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 30px;
}
.team {
  background: forestgreen;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  min-width: 150px;
}
.team-name {
  font-size: 1.3em;
  margin-bottom: 10px;
}
.score {
  font-size: 2em;
}
.score-controls button {
  margin: 5px;
  padding: 5px 10px;
  font-size: 1em;
  background-color: #2196f3;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}
.score-controls button:hover {
  background-color: #e68900;
}

/* ====== GRID (теперь 2 колонки) ====== */
.list {
  max-width: 900px;
  margin: 0 auto 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  padding: 10px;
  justify-items: center;
}

/* ====== QUESTION BUTTON (как в Round 1) ====== */
.statement {
  position: relative;
  width: 240px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50px;
  cursor: pointer;
  font-size: 35px;
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 6px #000;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
   border: 5px solid #002868;
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.35),
    0 6px 10px rgba(0,0,0,0.6);
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 0;
}

/* чередование флагов */
.list .statement:nth-child(odd)  { background-image: url("image/ukflag.jpg"); }
.list .statement:nth-child(even) { background-image: url("image/usaflag.jpg"); }

/* тёмный оверлей */
.statement::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  border-radius: 50px;
  z-index: 1;
}

/* текст поверх оверлея */
.statement span {
  position: relative;
  z-index: 2;
}

/* hover */
.statement:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.35),
    0 12px 20px rgba(0,0,0,0.7);
}

/* использованный */
.statement.used {
  background: #555 !important;
  box-shadow: none;
  cursor: not-allowed;
}

/* ====== POPUP ====== */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}
.popup-content {
  background: #111;
  padding: 25px;
  width: 90%;
  max-width: 650px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 20px #000;
}
.timer {
  font-size: 2em;
  margin: 10px 0;
}
#questionText {
  font-size: 35px;
  line-height: 1.5;
  color: yellow;
}
.answer-buttons button {
  font-size: 1.4em;
  padding: 12px 40px;
  margin: 15px 20px;
  background-color: #2196f3;
}
.result {
  font-size: 1.8em;
  margin: 20px 0;
  min-height: 1.2em;
}
.correct { color: #00e676; }
.wrong   { color: #ff5252; }
button {
  cursor: pointer;
  border-radius: 8px;
  border: none;
  padding: 10px 15px;
  margin-top: 10px;
  background-color: #2196f3;
  color: #fff;
  font-size: 1em;
}
button:hover {
  background-color: #1e88e5;
}
.next-btn {
  display: block;
  margin: 40px auto;
  background-color: forestgreen;
  font-size: 1.3em;
  padding: 12px 120px;
}
.next-btn:hover {
  background-color: #45a049;
}
</style>
</head>
<body>

<h1>Round 2 - Fact or Fiction</h1>

<!-- SCOREBOARD -->
<div class="teams">
  <div class="team">
    <div id="team1Name" class="team-name">Team 1</div>
    <div id="score1" class="score">0</div>
    <div class="score-controls">
      <button onclick="changeScore(1,1)">+1</button>
      <button onclick="changeScore(1,-1)">-1</button>
    </div>
  </div>
  <div class="team">
    <div id="team2Name" class="team-name">Team 2</div>
    <div id="score2" class="score">0</div>
    <div class="score-controls">
      <button onclick="changeScore(2,1)">+1</button>
      <button onclick="changeScore(2,-1)">-1</button>
    </div>
  </div>
</div>

<!-- QUESTIONS GRID -->
<div class="list" id="list"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <div class="timer" id="timer">30</div>
    <button onclick="startTimer()">Start Timer</button>
    <p id="questionText"></p>
    <div class="answer-buttons">
      <button onclick="checkAnswer(true)">Fact</button>
      <button onclick="checkAnswer(false)">Fiction</button>
    </div>
    <div id="result" class="result"></div>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- SOUNDS -->
<audio id="correctSound" src="audio/correct.mp3"></audio>
<audio id="wrongSound" src="audio/wrong.mp3"></audio>

<!-- NEXT -->
<a href="round3.html"><button class="next-btn">Next</button></a>

<script>
// TEAM NAMES + SCORES from localStorage (как было)
document.getElementById("team1Name").textContent = localStorage.getItem("team1Name") || "Team 1";
document.getElementById("team2Name").textContent = localStorage.getItem("team2Name") || "Team 2";

let score1 = Number(localStorage.getItem("score1")) || 0;
let score2 = Number(localStorage.getItem("score2")) || 0;
document.getElementById("score1").textContent = score1;
document.getElementById("score2").textContent = score2;

function changeScore(team, delta) {
  if (team === 1) {
    score1 += delta;
    document.getElementById("score1").textContent = score1;
    localStorage.setItem("score1", score1);
  } else {
    score2 += delta;
    document.getElementById("score2").textContent = score2;
    localStorage.setItem("score2", score2);
  }
}

// QUESTIONS
const data = [
  { text: "The Loch Ness Monster lives in Loch Ness.",              answer: false },
  { text: "Big Ben is the name of the tower.",                      answer: false },
  { text: "It rains every day in England.",                         answer: false },
  { text: "Jack the Ripper was caught by London police.",           answer: false },
  { text: "Queen Elizabeth II ruled for more than 60 years.",       answer: true  },
  { text: "The Globe Theatre in London was Shakespeare’s theatre.", answer: true  },
  { text: "Britain still rules colonies all over the world.",       answer: false },
  { text: "The Statue of Liberty was a gift from France to the USA.", answer: true  },
  { text: "The Declaration of Independence was signed in 1776.",    answer: true  },
  { text: "America was discovered in the 18th century.",            answer: false },
  { text: "The White House is located in New York.",                answer: false },
  { text: "Hollywood is a city where American movies are produced.", answer: true  },
  { text: "The first person on the Moon was an American.",          answer: true  },
  { text: "The USA was the first country to invent the Internet.",  answer: true  },
  { text: "Shakespeare was born in London.",                        answer: false },
  { text: "The Union Jack is the flag of the United Kingdom.",      answer: true  }
];

// BUILD GRID
const list = document.getElementById("list");
data.forEach((_, i) => {
  const div = document.createElement("div");
  div.className = "statement";
  div.innerHTML = `<span>Question ${i+1}</span>`;
  div.onclick = () => openQuestion(div, i);
  list.appendChild(div);
});

let current = 0;
let timeLeft = 30;
let timerInterval = null;

function openQuestion(el, index) {
  if (el.classList.contains("used")) return;
  el.classList.add("used");

  current = index;
  document.getElementById("questionText").textContent = data[index].text;
  document.getElementById("result").textContent = "";
  timeLeft = 30;
  document.getElementById("timer").textContent = timeLeft;
  clearInterval(timerInterval);

  document.getElementById("popup").style.display = "flex";
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById("result").textContent = "⏰ Time's up!";
    }
  }, 1000);
}

function checkAnswer(ans) {
  clearInterval(timerInterval);
  const result = document.getElementById("result");

  if (ans === data[current].answer) {
    result.textContent = "✔ Correct!";
    result.className = "result correct";
    document.getElementById("correctSound").play();
  } else {
    result.textContent = "✖ Wrong!";
    result.className = "result wrong";
    document.getElementById("wrongSound").play();
  }
}

function closePopup() {
  clearInterval(timerInterval);
  document.getElementById("popup").style.display = "none";
}
</script>
</body>
</html>
