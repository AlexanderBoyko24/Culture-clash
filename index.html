<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Clash: UK vs USA!</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    text-align: center;
    background-image: url('image/1.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    backdrop-filter: blur(5px);
  }

  h1 {
    font-size: 3em;
    margin-bottom: 40px;
    text-shadow: 2px 2px 8px #000;
  }

  form {
    background: rgba(0,0,0,0.6);
    padding: 30px 40px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    width: 100%;
    max-width: 400px;
    animation: fadeIn 1s ease-out;
  }

  form input {
    display: block;
    padding: 12px 15px;
    margin: 15px auto;
    width: 80%;
    border-radius: 8px;
    border: none;
    font-size: 1em;
    text-align: center;
  }

  form button {
    padding: 12px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #ff9800;
    color: #fff;
    transition: 0.3s;
    margin-top: 10px;
  }

  form button:hover {
    background-color: #e68900;
    transform: scale(1.05);
  }

  /* 🎵 Music button */
  .music-btn {
    margin-top: 25px;
    padding: 10px 25px;
    font-size: 1.1em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: rgba(255,255,255,0.2);
    color: #fff;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .music-btn:hover {
    background-color: rgba(255,255,255,0.35);
    transform: scale(1.05);
  }

  .good-luck {
    margin-top: 15px;
    font-size: 1.5em;
    font-style: italic;
    text-shadow: 1px 1px 4px #000;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body>
<div class="container">
  <h1>Culture Clash: UK vs USA!</h1>

  <form id="teamForm">
    <input type="text" id="team1" placeholder="Team 1 Name" required>
    <input type="text" id="team2" placeholder="Team 2 Name" required>
    <button type="submit">Start Quiz</button>
  </form>

  <!-- 🎵 Audio -->
  <audio id="bgMusic" src="audio/wewillrockyou.mp3" loop></audio>
  <button class="music-btn" id="musicToggle">▶ Rock them</button>

  <p class="good-luck">Good Luck!</p>
</div>

<script>
  // teams
  const form = document.getElementById('teamForm');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    localStorage.setItem("team1Name", team1.value.trim() || "Team 1");
    localStorage.setItem("team2Name", team2.value.trim() || "Team 2");
    window.location.href = "rounds.html";
  });

  // music
  const music = document.getElementById('bgMusic');
  const btn = document.getElementById('musicToggle');

  btn.addEventListener('click', () => {
    if (music.paused) {
      music.play();
      btn.textContent = "⏸ Pause Music";
    } else {
      music.pause();
      btn.textContent = "▶ Play Music";
    }
  });
</script>
</body>
</html>
