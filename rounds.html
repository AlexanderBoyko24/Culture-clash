<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Round</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Roboto', Arial, sans-serif;
    color: #fff;
    text-align: center;
    background-image: url('image/1.jpg'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5); 
    z-index: -1;
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    font-size: 3.5em;
    margin-bottom: 50px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
  }

  .round-buttons {
    display: flex;
    flex-direction: column;
    gap: 25px;
    width: 300px;
  }

  /* Общие стили кнопок */
  .round {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 260px;   
    height: 120px;  
    border: 5px solid #002868;
    border-radius: 14px;
    color: #00FFFF;
    font-size: 40px; /* текст немного больше */
    font-weight: bold;
    text-decoration: none;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9); /* выделение текста */
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  /* Hover эффект */
  .round:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 12px 30px rgba(0,0,0,0.9);
  }

  /* Активное нажатие */
  .round:active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 6px 10px rgba(0,0,0,0.3);
  }

  /* Флаги с затемнением */
  .round.usa {
    background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('image/usaflag.jpg');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
  }

  .round.uk {
    background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('image/ukflag.jpg');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
  }

</style>
</head>

<body>
  <div class="container">
    <h1>Choose Your Round</h1>

    <div class="round-buttons">
      <a href="round1.html" class="round usa">Jeopardy</a>
      <a href="round2.html" class="round uk">Fact or Fiction</a>
      <a href="round3.html" class="round usa">Magnificent Five</a>
      <a href="round4.html" class="round uk">Culture Quest</a>
    </div>
  </div>
</body>
</html>
